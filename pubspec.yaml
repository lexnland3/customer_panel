name: customer
description: LexNLand Customer App - Find & Buy Plots

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  http_parser: ^4.0.2
  shared_preferences: ^2.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  image_picker: ^1.1.2
  record: ^5.1.0
  audioplayers: ^6.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo_small.png
    - assets/images/logo_small_white.png
    - assets/images/logo_large.png
    - assets/images/logo.svg
